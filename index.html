<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroVistas | Thế Giới Vi Mô</title>
    <meta name="description" content="Thư viện ảnh hiển vi chất lượng cao, khám phá vẻ đẹp ẩn giấu của thế giới vi mô.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-glow top-left"></div>
    <div class="bg-glow bottom-right"></div>

    <header class="glass-header">
        <div class="header-container">
            <h1 class="logo">Micro<span>Vistas</span></h1>
            <nav>
                <button class="btn-primary" id="upload-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Tải ảnh lên
                </button>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <h2>Khám Phá Thế Giới Ẩn Giấu</h2>
            <p>Trưng bày và lưu giữ vẻ đẹp ngoạn mục của các cấu trúc vi mô qua lăng kính hiển vi.</p>
        </section>

        <section class="gallery-section">
            <div class="gallery-grid" id="gallery">
                <!-- Hình ảnh sẽ được render từ JavaScript -->
            </div>
        </section>
    </main>

    <!-- Modal Xem Chi Tiết Ảnh -->
    <div class="modal" id="image-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass-panel">
            <button class="btn-close" id="close-modal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img src="" alt="Chi tiết ảnh vi mô" id="modal-img">
                </div>
                <div class="modal-info">
                    <h3 id="modal-title">Tên Mẫu Vật</h3>
                    <div class="meta-data">
                        <span class="badge" id="modal-mag">400x</span>
                        <span class="date" id="modal-date">01/01/2026</span>
                    </div>
                    <p class="description" id="modal-desc">Mô tả chi tiết về bức ảnh...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Thông Báo Upload -->
    <div class="modal" id="upload-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass-panel upload-panel">
            <button class="btn-close" id="close-upload">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-body" style="flex-direction: column; text-align: left;">
                <h3 style="margin-bottom: 1.5rem; font-family: 'Outfit', sans-serif; font-size: 1.8rem; text-align: center;">Thêm Ảnh Mới</h3>
                <form id="upload-form" class="upload-form">
                    <div class="form-group">
                        <label for="upload-title">Tên mẫu vật</label>
                        <input type="text" id="upload-title" required placeholder="Nhập tên mẫu vật...">
                    </div>
                    <div class="form-group">
                        <label for="upload-file">Chọn ảnh</label>
                        <input type="file" id="upload-file" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label for="upload-mag">Độ phóng đại</label>
                        <input type="text" id="upload-mag" required placeholder="VD: 400x">
                    </div>
                    <div class="form-group">
                        <label for="upload-desc">Mô tả chi tiết</label>
                        <textarea id="upload-desc" rows="3" required placeholder="Nhập mô tả..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="justify-content: center; margin-top: 1rem; padding: 0.8rem;">Đăng Ảnh</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
